[build]
  publish = "dashboard"

# /api-ping must 404 on Netlify — dashboard JS uses this to detect static mode
[[redirects]]
  from   = "/api-ping"
  to     = "/404"
  status = 404
  force  = true

# Flask endpoint aliases so old bookmarks and the IS_LIVE codepath still work
[[redirects]]
  from   = "/rentals"
  to     = "/rentals_latest.json"
  status = 200

[[redirects]]
  from   = "/sales"
  to     = "/sales_latest.json"
  status = 200

[[redirects]]
  from   = "/listings"
  to     = "/latest.json"
  status = 200

[[redirects]]
  from   = "/favourites"
  to     = "/favourites.html"
  status = 200

# JSON: 1-hour browser cache — fresh data arrives via daily GitHub Actions commit + Netlify redeploy
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
