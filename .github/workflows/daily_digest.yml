name: Daily Email Digest

# Per-user personalised digest. Reads filters from the digest_filters
# Supabase table and listings from the listings table — no local JSON
# snapshots, no self-hosted runner needed.
#
# Required GitHub secrets:
#   SUPABASE_URL          project URL
#   SUPABASE_SERVICE_KEY  service-role key (read access to all tables)
#   GMAIL_USER            sender Gmail address
#   GMAIL_APP_PASSWORD    Gmail app password
#   DASHBOARD_URL         public dashboard URL (e.g. https://immobiliare-scorer.pages.dev)

on:
  schedule:
    # Hourly — the script filters to users whose send_time_utc matches the
    # current UTC hour, so each user gets exactly one email per day at the
    # time they picked in the Save-alert modal.
    - cron: '0 * * * *'
  workflow_dispatch:       # manual trigger for testing
    inputs:
      dry_run:
        description: 'Build emails but don''t actually send (debug)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_all_users:
        description: 'Ignore send_time_utc and email every active user (testing)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Run all JavaScript-based actions (checkout@v4, setup-python@v5, etc.)
# on Node 24 immediately, instead of waiting for GitHub's June 2026 default
# flip. Node 20 is fully removed from the runner on 2026-09-16; this just
# opts in early so we get any incompatibility surface NOW, not silently in
# CI five months from now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No `pip install` step — email_digest_supabase.py uses stdlib only
      # (urllib, smtplib, email, json). Keeps the run under 10 seconds.

      - name: Send digest emails
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL:        ${{ secrets.DASHBOARD_URL }}
          DIGEST_DRY_RUN:       ${{ inputs.dry_run == 'true' && '1' || '' }}
          DIGEST_FORCE_ALL:     ${{ inputs.force_all_users == 'true' && '1' || '' }}
        run: python3 email_digest_supabase.py
