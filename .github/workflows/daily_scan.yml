name: Scan Listings (daily)

# Per-city matrix: each city's scan runs as an independent job step
# (sequentially on the single self-hosted Mac runner). One city failing
# never blocks the others — fail-fast disabled. Each step ends by syncing
# its city's rows to Supabase and committing per-city state files.

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 12:00 CEST / 11:00 CET
  workflow_dispatch:
    inputs:
      city:
        description: 'City to scan (leave empty for all)'
        required: false
        default: ''
        type: choice
        options: ['', 'milano', 'roma', 'napoli', 'la_maddalena']
      pages:
        description: 'Pages per area (overrides scan_prefs.json)'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scan:
    runs-on: self-hosted
    timeout-minutes: 120
    defaults:
      run:
        working-directory: /Users/giovannidimartino/Downloads/immobiliare-scorer
    strategy:
      # Single Mac runner → each matrix entry runs serially. Disabled
      # fail-fast so a single-city failure doesn't abort the rest.
      fail-fast: false
      matrix:
        city: [milano, roma, napoli, la_maddalena]

    steps:
      - name: Pull latest code
        # Skip the city loop when workflow_dispatch picked one specific city.
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: git pull origin main

      - name: Install dependencies
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: pip3 install -r requirements.txt

      - name: Run rentals scanner — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        env:
          IDEALISTA_KEY: ${{ secrets.IDEALISTA_KEY }}
          IDEALISTA_SECRET: ${{ secrets.IDEALISTA_SECRET }}
        run: python3 fetch_rentals.py --city ${{ matrix.city }}

      - name: Run Idealista scanner — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        env:
          IDEALISTA_KEY: ${{ secrets.IDEALISTA_KEY }}
          IDEALISTA_SECRET: ${{ secrets.IDEALISTA_SECRET }}
        run: python3 fetch_idealista.py --city ${{ matrix.city }}
        continue-on-error: true

      - name: Run sales scanner — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: python3 fetch_listings.py --city ${{ matrix.city }}
        continue-on-error: true

      - name: Trim old cache entries
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: python3 trim_cache.py --max-age-days 90
        continue-on-error: true

      - name: Print scan summary — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: |
          python3 -c "
          import json, os
          city = '${{ matrix.city }}'
          for kind in ('rentals', 'sales'):
              path = f'dashboard/{city}_{kind}_latest.json'
              if os.path.exists(path):
                  data = json.load(open(path))
                  print(f'{city}/{kind}: {len(data)} listings')
              else:
                  print(f'{city}/{kind}: file missing — skipping summary')
          "

      # Supabase is the sole data source for the deployed dashboard.
      # Each city's listings get tagged with city='{matrix.city}' inside
      # supabase_sync, so cross-city queries on the dashboard filter cleanly.
      - name: Sync listings to Supabase — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 supabase_sync.py --city ${{ matrix.city }} --type rental
          python3 supabase_sync.py --city ${{ matrix.city }} --type sale

      # Per-city state files. The seen_ids file is city-specific
      # (seen_ids_{city}.json) so each city's dedup history is isolated.
      # The enrichment cache currently stays shared (enriched_cache.json) —
      # listing IDs are globally unique across cities, so a single cache
      # is fine.
      - name: Commit and push updated state — ${{ matrix.city }}
        if: ${{ inputs.city == '' || inputs.city == matrix.city }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids_${{ matrix.city }}.json || true
          git add enriched_cache.json || true
          git diff --staged --quiet || git commit -m "chore: daily scan ${{ matrix.city }} $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
