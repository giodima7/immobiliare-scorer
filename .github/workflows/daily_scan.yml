name: Scan Listings (daily)

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 12:00 CEST / 11:00 CET
  workflow_dispatch:         # allows manual trigger from GitHub UI
    inputs:
      pages:
        description: 'Pages per area (overrides scan_prefs.json)'
        required: false
        default: ''
        type: string

jobs:
  scan:
    # Runs on your local Mac via the GitHub Actions self-hosted runner.
    # Works directly in the project folder so scan_prefs.json and
    # area_settings.json always reflect whatever you configured in the dashboard.
    runs-on: self-hosted
    timeout-minutes: 120
    defaults:
      run:
        working-directory: /Users/giovannidimartino/Downloads/immobiliare-scorer

    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run rentals scanner
        env:
          IDEALISTA_KEY: ${{ secrets.IDEALISTA_KEY }}
          IDEALISTA_SECRET: ${{ secrets.IDEALISTA_SECRET }}
        run: python3 fetch_rentals.py

      - name: Run Idealista scanner
        env:
          IDEALISTA_KEY: ${{ secrets.IDEALISTA_KEY }}
          IDEALISTA_SECRET: ${{ secrets.IDEALISTA_SECRET }}
        run: python3 fetch_idealista.py
        continue-on-error: true

      - name: Run sales scanner
        run: python3 fetch_listings.py
        continue-on-error: true

      - name: Trim old cache entries
        run: python3 trim_cache.py --max-age-days 90

      - name: Print scan summary
        run: |
          python3 -c "
          import json
          r = json.load(open('dashboard/rentals_latest.json'))
          print(f'Rentals: {len(r)} listings')
          s = json.load(open('dashboard/sales_latest.json'))
          print(f'Sales: {len(s)} listings')
          c = json.load(open('enriched_cache.json'))
          print(f'Cache: {len(c)} enriched entries')
          gems = [x for x in r if x.get('hidden_gem')]
          print(f'Hidden gems: {len(gems)}')
          "

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/rentals_latest.json
          git add dashboard/sales_latest.json
          git add enriched_cache.json
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "chore: daily scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
