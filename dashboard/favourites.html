<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favourites — Immobiliare Scorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #FAFAF9;
  --surface: #FFFFFF;
  --surf2:   #F5F5F3;
  --border:  #E8E8E3;
  --accent:  #2D6A4F;
  --accent-light: #D1FAE5;
  --green:   #16A34A;
  --yellow:  #D97706;
  --red:     #DC2626;
  --text:    #111827;
  --muted:   #6B7280;
  --radius:  14px;
  --shadow:  0 1px 3px rgba(0,0,0,0.07), 0 4px 14px rgba(0,0,0,0.05);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
header h1 { font-size: 17px; font-weight: 700; color: var(--text); }
header h1 span { color: var(--accent); }

.back-link {
  font-size: 13px; color: var(--accent);
  text-decoration: none; padding: 5px 12px;
  border: 1px solid var(--accent); border-radius: 8px;
  font-weight: 600;
}
.back-link:hover { background: var(--accent-light); }

.fav-count {
  font-size: 12px; color: var(--muted);
  background: var(--surf2); padding: 4px 12px;
  border-radius: 20px; border: 1px solid var(--border);
}

.btn-compare {
  background: var(--accent-light);
  border: 1px solid var(--accent);
  color: var(--accent);
  border-radius: 8px; padding: 6px 14px;
  cursor: pointer; font-size: 13px; font-weight: 600;
}
.btn-compare:hover { background: var(--accent); color: #fff; }
.btn-compare.active { background: var(--accent); color: #fff; }

.btn-clear-all {
  margin-left: auto;
  background: transparent;
  border: 1px solid #FCA5A5;
  color: var(--red); border-radius: 8px; padding: 5px 12px;
  cursor: pointer; font-size: 12px; font-weight: 500;
}
.btn-clear-all:hover { background: #FEF2F2; }

/* ── Section tabs ── */
.section-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  background: var(--surface);
}
.sec-tab {
  background: none; border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted); font-size: 14px; font-weight: 500;
  padding: 12px 20px; cursor: pointer; font-family: inherit;
}
.sec-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.sec-tab:hover { color: var(--text); }
.sec-badge {
  display: inline-block; background: var(--surf2); color: var(--muted);
  font-size: 10px; font-weight: 700; padding: 1px 6px;
  border-radius: 10px; margin-left: 5px; border: 1px solid var(--border);
}
.sec-tab.active .sec-badge { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

/* ── Compare table ── */
#compareSection {
  overflow-x: auto;
  border-bottom: 2px solid var(--accent);
  background: var(--surface);
}
.compare-table { border-collapse: collapse; min-width: 600px; width: 100%; }
.compare-table th, .compare-table td {
  border: 1px solid var(--border); padding: 7px 12px;
  text-align: right; font-size: 12px; white-space: nowrap;
}
.compare-table th { background: var(--surf2); color: var(--muted); font-weight: 600; text-align: left; }
.compare-table td:first-child { text-align: left; color: var(--muted); }
.compare-table thead th { background: var(--surf2); color: var(--text); text-align: center; font-size: 13px; }
.compare-table thead th:first-child { text-align: left; color: var(--muted); }
.compare-best  { color: var(--green); font-weight: 700; }
.compare-worst { color: var(--red); }

/* ── Cards grid ── */
.cards-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
  gap: 20px;
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
@media (max-width: 600px) { .cards-container { grid-template-columns: 1fr; } }

/* ── Fav card ── */
.fav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.fav-card:hover { border-color: var(--accent); }

.fav-card-top {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.score-badge {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  flex-shrink: 0;
}
.score-badge.high { background: #D1FAE5; color: #15803D; border: 2px solid #6EE7B7; }
.score-badge.mid  { background: #FEF3C7; color: #92400E; border: 2px solid #FCD34D; }
.score-badge.low  { background: #FEE2E2; color: #991B1B; border: 2px solid #FCA5A5; }

.fav-card-title { flex: 1; min-width: 0; }
.fav-card-title .neigh {
  font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.3;
}
.fav-card-title .address { font-size: 11px; color: var(--muted); margin-top: 2px; }

.city-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 10px; margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.tag-napoli { background: #EFF6FF; color: #1D4ED8; }
.tag-milano { background: #F5F3FF; color: #7C3AED; }
.tag-roma   { background: #FFF1F2; color: #BE123C; }
.tag-other  { background: #F0FDF4; color: #15803D; }

.source-pill {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 7px; border-radius: 8px; margin-left: 5px;
}
.source-immobiliare { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.source-idealista    { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }

.fascia-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 4px; margin-left: 6px;
}
.fascia-A { background: #EFF6FF; color: #1D4ED8; }
.fascia-B { background: #FEF3C7; color: #92400E; }
.fascia-C { background: #FEE2E2; color: #991B1B; }

.fav-card-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
.btn-remove-fav {
  background: transparent; border: 1px solid #FCA5A5;
  color: var(--red); border-radius: 7px; padding: 4px 10px;
  cursor: pointer; font-size: 11px; font-weight: 500; white-space: nowrap;
}
.btn-remove-fav:hover { background: #FEF2F2; }
.btn-view {
  font-size: 11px; color: var(--accent); text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--accent);
  border-radius: 7px; white-space: nowrap; font-weight: 600;
}
.btn-view:hover { background: var(--accent-light); }

/* ── Info grid ── */
.fav-card-body {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; flex: 1;
}
.info-section {
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.info-section:nth-child(2n) { border-right: none; }
.section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--muted);
  margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.info-row {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 6px; margin-bottom: 4px; font-size: 12px;
}
.info-row .lbl { color: var(--muted); }
.info-row .val { font-weight: 600; text-align: right; }
.val-good  { color: var(--green) !important; }
.val-warn  { color: var(--yellow) !important; }
.val-bad   { color: var(--red) !important; }
.val-accent { color: var(--accent) !important; }

.big-val { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.sub-val { font-size: 11px; color: var(--muted); }

/* ── Explanation bullets ── */
.expl-list { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
.expl-bullet { font-size: 11px; line-height: 1.4; padding: 2px 4px; border-radius: 4px; }
.expl-good { color: #15803D; background: #F0FDF4; }
.expl-bad  { color: #991B1B; background: #FEF2F2; }
.expl-warn { color: #92400E; background: #FFFBEB; }

/* ── Score bar ── */
.score-bar {
  display: flex; border-top: 1px solid var(--border);
}
.score-part { flex: 1; text-align: center; padding: 8px 4px; border-right: 1px solid var(--border); }
.score-part:last-child { border-right: none; }
.sp-val { font-size: 17px; font-weight: 700; }
.sp-lbl { font-size: 9px; color: var(--muted); margin-top: 1px; }
.sp-price  { color: var(--accent); }
.sp-prop   { color: #7C3AED; }
.sp-loc    { color: #0369A1; }
.sp-pen    { color: var(--yellow); }
.sp-total  { color: var(--text); font-size: 20px !important; }
.sp-total.high { color: var(--green) !important; }
.sp-total.mid  { color: var(--yellow) !important; }
.sp-total.low  { color: var(--red) !important; }

/* vs-comps badge */
.vs-badge {
  font-size: 11px; font-weight: 600; padding: 2px 7px;
  border-radius: 5px; white-space: nowrap;
}
.vs-below { background: #D1FAE5; color: #15803D; }
.vs-at    { background: #FEF3C7; color: #92400E; }
.vs-above { background: #FEE2E2; color: #991B1B; }

/* ── Empty / error ── */
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty h2 { font-size: 22px; margin-bottom: 12px; color: var(--text); }
.empty p  { line-height: 1.8; }
.empty a  { color: var(--accent); font-weight: 600; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <a class="back-link" href="/">← Dashboard</a>
  <h1>♥ <span>Favourites</span></h1>
  <span class="fav-count" id="favCount">Loading…</span>
  <button class="btn-compare" id="btnCompare" hidden>⇔ Compare</button>
  <button class="btn-clear-all" id="btnClearAll" hidden>✕ Clear all</button>
</header>

<nav class="section-tabs">
  <button class="sec-tab active" id="tabRentals" onclick="showSection('rentals')">
    🔑 Rentals <span class="sec-badge" id="rentCount">0</span>
  </button>
  <button class="sec-tab" id="tabSales" onclick="showSection('sales')">
    🏡 Sales <span class="sec-badge" id="salesCount">0</span>
  </button>
</nav>

<div id="compareSection" hidden></div>

<div class="cards-container" id="cardsContainer"></div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
// Scope localStorage keys per-user, matching the Storage module in index.html.
// netlifyIdentity.currentUser() is synchronous once init() has run.
(function () {
  const ni = window.netlifyIdentity;
  if (ni) ni.init();
  const userId = ni?.currentUser()?.id || 'guest';
  window._FAV_KEY      = `scorer_favourites_${userId}`;
  window._RENT_FAV_KEY = `scorer_rentFavourites_${userId}`;
})();

const FAV_KEY      = window._FAV_KEY;
const RENT_FAV_KEY = window._RENT_FAV_KEY;

function getSalesFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; } }
function getRentFavs()  { try { return JSON.parse(localStorage.getItem(RENT_FAV_KEY)) || []; } catch { return []; } }
function saveSalesFavs(ids) { localStorage.setItem(FAV_KEY, JSON.stringify(ids)); }
function saveRentFavs(ids)  { localStorage.setItem(RENT_FAV_KEY, JSON.stringify(ids)); }

const fmt        = n => n != null ? Number(n).toLocaleString('it-IT') : '–';
const scoreClass = s => s >= 70 ? 'high' : s >= 45 ? 'mid' : 'low';
const vsClass    = p => p != null ? (p <= -5 ? 'vs-below' : p >= 5 ? 'vs-above' : 'vs-at') : '';

function cityTag(ck) {
  return { napoli: 'tag-napoli', milano: 'tag-milano', roma: 'tag-roma' }[ck] || 'tag-other';
}

// ── Rental card ───────────────────────────────────────────────────────────
function renderRentCard(l) {
  const sc   = scoreClass(l.score_total);
  const ct   = cityTag(l.city_key);
  const dp   = l.comps_delta_pct;
  const vc   = vsClass(dp);
  const vsLabel = l.comps_label || l.vs_omi_label || '–';

  const bullets = (l.score_explanation || []);
  const bulletsHtml = bullets.map(b => {
    const cls = b.startsWith('✓') ? 'expl-good' : b.startsWith('✗') ? 'expl-bad' : 'expl-warn';
    return `<div class="expl-bullet ${cls}">${b}</div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'fav-card';
  card.dataset.id = l.id;
  card.dataset.type = 'rental';

  card.innerHTML = `
    <div class="fav-card-top">
      <div class="score-badge ${sc}">${l.score_total ?? '–'}</div>
      <div class="fav-card-title">
        <div class="neigh">
          ${l.neighbourhood || '–'}
          ${l.omi_fascia ? `<span class="fascia-badge fascia-${l.omi_fascia}">Fascia ${l.omi_fascia}</span>` : ''}
        </div>
        ${l.address ? `<div class="address">${l.address}</div>` : ''}
        <span class="city-tag ${ct}">${l.city || l.city_key || 'Milano'}</span>
        <span class="source-pill source-${l.source || 'immobiliare'}">${l.source === 'idealista' ? 'Idealista' : 'Immobiliare.it'}</span>
      </div>
      <div class="fav-card-actions">
        <button class="btn-remove-fav" data-id="${l.id}" data-type="rental">♥ Remove</button>
        <a class="btn-view" href="${l.url}" target="_blank" rel="noopener">↗ View</a>
      </div>
    </div>

    <div class="fav-card-body">
      <div class="info-section">
        <div class="section-title">Rent &amp; Size</div>
        <div class="big-val">€${fmt(l.rent_mo)}<span style="font-size:13px;font-weight:500;color:var(--muted)">/mo</span></div>
        <div class="sub-val" style="margin-bottom:8px">${fmt(l.sqm)} m² · €${fmt(l.ask_psqm)}/m²/mo</div>
        <div class="info-row">
          <span class="lbl">Rooms</span><span class="val">${l.rooms ?? '–'}</span>
        </div>
        <div class="info-row">
          <span class="lbl">Floor</span><span class="val">${l.floor ?? '–'}</span>
        </div>
        <div class="info-row">
          <span class="lbl">Condition</span><span class="val">${l.condition || '–'}</span>
        </div>
        ${l.spese_condominiali ? `<div class="info-row"><span class="lbl">Condo fees</span><span class="val val-warn">+€${fmt(l.spese_condominiali)}/mo</span></div>` : ''}
      </div>

      <div class="info-section">
        <div class="section-title">Score &amp; Comps</div>
        <div class="info-row">
          <span class="lbl">vs comps</span>
          <span class="vs-badge ${vc}">${vsLabel}</span>
        </div>
        <div class="info-row">
          <span class="lbl">Comps median</span>
          <span class="val">${l.comps_median != null ? '€' + l.comps_median + '/m²' : '–'}</span>
        </div>
        <div class="info-row">
          <span class="lbl">Comps count</span>
          <span class="val">${l.comps_n != null ? l.comps_n + ' listings' : '–'}</span>
        </div>
        <div class="info-row">
          <span class="lbl">Confidence</span>
          <span class="val">${l.comps_conf_label || '–'}</span>
        </div>
        ${l.suggested_rent_mo ? `<div class="info-row"><span class="lbl">OMI suggested</span><span class="val val-accent">€${fmt(l.suggested_rent_mo)}/mo</span></div>` : ''}
        ${l.geo_score != null ? `<div class="info-row"><span class="lbl">Geo score</span><span class="val">${l.geo_score}/100</span></div>` : ''}
        ${l.metro_nearest_name ? `<div class="info-row"><span class="lbl">Nearest metro</span><span class="val">${l.metro_nearest_name} ${l.metro_nearest_dist_m ?? ''}m</span></div>` : ''}
      </div>
    </div>

    ${bulletsHtml ? `<div class="expl-list">${bulletsHtml}</div>` : ''}

    <div class="score-bar">
      <div class="score-part">
        <div class="sp-val sp-price">${l.score_price ?? l.score_rent ?? '–'}</div>
        <div class="sp-lbl">Price</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-prop">${l.score_property ?? l.score_physical ?? '–'}</div>
        <div class="sp-lbl">Property</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-loc">${l.score_location ?? l.geo_score ?? '–'}</div>
        <div class="sp-lbl">Location</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-total ${sc}">${l.score_total ?? '–'}</div>
        <div class="sp-lbl"><strong>Total</strong></div>
      </div>
    </div>
  `;

  card.querySelector('.btn-remove-fav').addEventListener('click', () => {
    const ids = getRentFavs().filter(x => x !== String(l.id));
    saveRentFavs(ids);
    card.remove();
    refreshCounts();
  });

  return card;
}

// ── Sales card ────────────────────────────────────────────────────────────
function renderSaleCard(l) {
  const sc = scoreClass(l.score_total);
  const ct = cityTag(l.city_key);
  const vc = vsClass(l.vs_omi_pct);

  const card = document.createElement('div');
  card.className = 'fav-card';
  card.dataset.id = l.id;
  card.dataset.type = 'sale';

  card.innerHTML = `
    <div class="fav-card-top">
      <div class="score-badge ${sc}">${l.score_total ?? '–'}</div>
      <div class="fav-card-title">
        <div class="neigh">
          ${l.neighbourhood || '–'}
          ${l.omi_fascia ? `<span class="fascia-badge fascia-${l.omi_fascia}">Fascia ${l.omi_fascia}</span>` : ''}
        </div>
        ${l.address ? `<div class="address">${l.address}</div>` : ''}
        <span class="city-tag ${ct}">${l.city || l.city_key || '–'}</span>
      </div>
      <div class="fav-card-actions">
        <button class="btn-remove-fav" data-id="${l.id}" data-type="sale">♥ Remove</button>
        <a class="btn-view" href="${l.url}" target="_blank" rel="noopener">↗ View</a>
      </div>
    </div>

    <div class="fav-card-body">
      <div class="info-section">
        <div class="section-title">Price &amp; Property</div>
        <div class="big-val">€${fmt(l.price)}</div>
        <div class="sub-val" style="margin-bottom:8px">${fmt(l.sqm)} m² · €${fmt(l.ask_psqm)}/m²</div>
        <div class="info-row"><span class="lbl">Rooms</span><span class="val">${l.rooms ?? '–'}</span></div>
        <div class="info-row"><span class="lbl">Floor</span><span class="val">${l.floor ?? '–'}</span></div>
        <div class="info-row"><span class="lbl">Condition</span><span class="val">${l.condition || '–'}</span></div>
        ${l.elevator != null ? `<div class="info-row"><span class="lbl">Elevator</span><span class="val">${l.elevator ? 'Yes' : 'No'}</span></div>` : ''}
      </div>

      <div class="info-section">
        <div class="section-title">OMI &amp; Score</div>
        <div class="info-row">
          <span class="lbl">vs OMI</span>
          <span class="vs-badge ${vc}">${l.vs_omi_label || '–'}</span>
        </div>
        <div class="info-row"><span class="lbl">OMI zone</span><span class="val val-accent">${l.omi_zona || l.omi_zone || '–'}</span></div>
        <div class="info-row"><span class="lbl">Fascia</span><span class="val">${l.omi_fascia || '–'}</span></div>
        ${l.est_yield_pct != null ? `<div class="info-row"><span class="lbl">Est. yield</span><span class="val val-good">${Number(l.est_yield_pct).toFixed(2)}%</span></div>` : ''}
        ${l.est_rent_mo != null ? `<div class="info-row"><span class="lbl">Est. rent/mo</span><span class="val">€${fmt(l.est_rent_mo)}</span></div>` : ''}
      </div>
    </div>

    <div class="score-bar">
      <div class="score-part">
        <div class="sp-val sp-price">${l.score_price ?? '–'}</div>
        <div class="sp-lbl">Price</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-prop">${l.score_yield ?? '–'}</div>
        <div class="sp-lbl">Yield</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-loc">${l.score_fascia ?? '–'}</div>
        <div class="sp-lbl">Fascia</div>
      </div>
      <div class="score-part">
        <div class="sp-val sp-total ${sc}">${l.score_total ?? '–'}</div>
        <div class="sp-lbl"><strong>Total</strong></div>
      </div>
    </div>
  `;

  card.querySelector('.btn-remove-fav').addEventListener('click', () => {
    const ids = getSalesFavs().filter(x => x !== String(l.id));
    saveSalesFavs(ids);
    card.remove();
    refreshCounts();
  });

  return card;
}

// ── Section switching ─────────────────────────────────────────────────────
let _currentSection = 'rentals';
let _rentListings   = [];
let _saleListings   = [];

function showSection(sec) {
  _currentSection = sec;
  document.getElementById('tabRentals').classList.toggle('active', sec === 'rentals');
  document.getElementById('tabSales').classList.toggle('active', sec === 'sales');
  renderSection();
}

function renderSection() {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  document.getElementById('compareSection').hidden = true;

  const listings = _currentSection === 'rentals' ? _rentListings : _saleListings;
  if (!listings.length) {
    container.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <h2>No ${_currentSection} favourites</h2>
      <p>Go to the <a href="/">dashboard</a> and click ♡ on a ${_currentSection === 'rentals' ? 'rental' : 'sale'} listing.</p>
    </div>`;
    return;
  }

  listings.forEach(l => {
    const card = _currentSection === 'rentals' ? renderRentCard(l) : renderSaleCard(l);
    container.appendChild(card);
  });
}

function refreshCounts() {
  const rCount = document.querySelectorAll('.fav-card[data-type="rental"]').length;
  const sCount = document.querySelectorAll('.fav-card[data-type="sale"]').length;
  const total  = rCount + sCount;
  document.getElementById('favCount').textContent = total + ' saved';
  document.getElementById('rentCount').textContent = _rentListings.filter(l =>
    getRentFavs().includes(String(l.id))).length;
  document.getElementById('salesCount').textContent = _saleListings.filter(l =>
    getSalesFavs().includes(String(l.id))).length;
  if (!total) {
    document.getElementById('btnCompare').hidden = true;
    document.getElementById('btnClearAll').hidden = true;
  }
}

// ── Main ──────────────────────────────────────────────────────────────────
async function init() {
  const isHttp = location.protocol === 'http:' || location.protocol === 'https:';
  if (!isHttp) {
    document.getElementById('cardsContainer').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <h2>Needs an HTTP server</h2>
        <p>Run <code>python3 api.py</code> and open <strong>http://localhost:8000/</strong></p>
      </div>`;
    return;
  }

  const rentFavIds  = getRentFavs();
  const salesFavIds = getSalesFavs();

  // Fetch both listing sets in parallel
  const [rentResp, salesResp] = await Promise.allSettled([
    rentFavIds.length  ? fetch('/rentals').then(r => r.ok ? r.json() : []) : Promise.resolve([]),
    salesFavIds.length ? fetch('/sales').then(r => r.ok ? r.json() : []) : Promise.resolve([]),
  ]);

  const allRentals = rentResp.status  === 'fulfilled' ? (rentResp.value  || []) : [];
  const allSales   = salesResp.status === 'fulfilled' ? (salesResp.value || []) : [];

  _rentListings  = allRentals.filter(l => rentFavIds.includes(String(l.id)));
  _saleListings  = allSales.filter(l  => salesFavIds.includes(String(l.id)));

  const total = _rentListings.length + _saleListings.length;
  document.getElementById('favCount').textContent   = total + ' saved';
  document.getElementById('rentCount').textContent  = _rentListings.length;
  document.getElementById('salesCount').textContent = _saleListings.length;

  if (total > 0) {
    document.getElementById('btnClearAll').hidden = false;
  }

  // Show rentals first (most likely to have favs); switch to sales if none
  if (_rentListings.length === 0 && _saleListings.length > 0) {
    _currentSection = 'sales';
    document.getElementById('tabRentals').classList.remove('active');
    document.getElementById('tabSales').classList.add('active');
  }

  renderSection();

  // Clear all
  document.getElementById('btnClearAll').addEventListener('click', () => {
    const sec = _currentSection;
    const n = sec === 'rentals' ? _rentListings.length : _saleListings.length;
    if (!confirm(`Remove all ${n} ${sec} favourites?`)) return;
    if (sec === 'rentals') { saveRentFavs([]); _rentListings = []; }
    else                   { saveSalesFavs([]); _saleListings = []; }
    renderSection();
    refreshCounts();
  });
}

init();
</script>
